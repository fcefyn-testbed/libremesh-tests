# Hybrid lab tasks: dual exporter (isolated/mesh), labgrid-dut-proxy, labgrid-exporter-select.
# Run after playbook_labgrid.yml. Include only when exporter-isolated.yaml exists for the host.
#
- name: Deploy exporter-isolated (OpenWrt per-VLAN config)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/exporter/{{ inventory_hostname }}/exporter-isolated.yaml"
    dest: /etc/labgrid/exporter-isolated.yaml
  tags:
    - export

- name: Deploy exporter-mesh (LibreMesh VLAN 200 config)
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/exporter/{{ inventory_hostname }}/exporter-mesh.yaml"
    dest: /etc/labgrid/exporter-mesh.yaml
  tags:
    - export

- name: Set exporter symlink to isolated (replaces any existing exporter.yaml)
  ansible.builtin.file:
    src: exporter-isolated.yaml
    dest: /etc/labgrid/exporter.yaml
    state: link
    force: yes
  notify:
    - Restart labgrid-exporter
  tags:
    - export

- name: Install labgrid-dut-proxy
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/labgrid-dut-proxy"
    dest: /usr/local/sbin/labgrid-dut-proxy
    mode: "0755"

- name: Add labgrid-dut-proxy to sudoers
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "ALL ALL = NOPASSWD: /usr/local/sbin/labgrid-dut-proxy"
    validate: "visudo -cf %s"

- name: Install labgrid-exporter-select
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/labgrid-exporter-select"
    dest: /usr/local/sbin/labgrid-exporter-select
    mode: "0755"

- name: Add labgrid-exporter-select to sudoers
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "ALL ALL = NOPASSWD: /usr/local/sbin/labgrid-exporter-select"
    validate: "visudo -cf %s"
