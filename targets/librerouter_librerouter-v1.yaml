targets:
  main:
    features:
      - wan_port
      - wifi
    resources:
      RemotePlace:
        name: !template "$LG_PLACE"
    drivers:
      - PDUDaemonDriver: {}
      - TFTPProviderDriver: {}
      - SerialDriver:
          txdelay: 0.01
      - UBootDriver:
          login_timeout: 30
          # CONFIG_AUTOBOOT_KEYED is not set in the LibreRouter U-Boot
          # 1.1.x build (see include/955x.h: only CONFIG_BOOTDELAY=2 and
          # the simple "Hit any key to stop autoboot" loop in
          # common/main.c). Any byte sent during the 2 s window aborts
          # autoboot, so a single newline is enough — _spam_uboot_interrupt
          # in tftpstrategy.py blasts these for ~12 s by default which
          # comfortably brackets the bootdelay window.
          interrupt: "\n"
          autoboot: "Hit any key to stop autoboot"
          # The QCA9558 Atheros U-Boot prompt is `ath> ` (trailing
          # space; see include/955x.h CFG_PROMPT). pexpect matches on
          # substring so the trailing space is optional here.
          prompt: "ath>"
          # init_commands run at the U-Boot prompt before the
          # boot_command. Lines starting with `tftp`/`dhcp` are pulled
          # out by UBootTFTPStrategy and routed through its retry path
          # (TFTPProviderDriver pre-stages the file on the exporter and
          # bumps `bootfile` for us, so a bare `tftp <addr>` is enough).
          # The remaining lines are passed through verbatim.
          #
          # IMAGE FORMAT (changed 2026-04 in pi-lime-packages targets.yml):
          # The artifact this YAML loads is now an
          # `*-initramfs-kernel.bin` produced by
          # tools/ci/build_image_source.sh, which drives a FULL OpenWrt
          # source-tree build (`make world`) at tag v$openwrt_release
          # with `CONFIG_TARGET_ROOTFS_INITRAMFS=y` +
          # `CONFIG_TARGET_INITRAMFS_COMPRESSION_LZMA=y`. The kernel is
          # recompiled with `CONFIG_INITRAMFS_SOURCE` pointing at the
          # LibreMesh CPIO, so the rootfs lives INSIDE the kernel`s
          # own .init.ramfs section. U-Boot just needs to
          # `bootm <addr>`; the kernel`s populate_rootfs() drops the
          # embedded CPIO into rootfs with no help from the bootloader.
          #
          # We previously tried two simpler paths and dropped both:
          #   * image_format=multi-uimage (a legacy IH_TYPE_MULTI
          #     uImage carrying [kernel.lzma, rootfs.cpio]) — the
          #     LibreRouter U-Boot 1.1.x fork
          #     (https://github.com/LibreRouterOrg/u-boot,
          #     lib_mips/mips_linux.c) does NOT propagate sub-image-1
          #     to the MIPS kernel as initrd_start/initrd_size. The
          #     kernel cmdline ended up `console=ttyS0,115200n8
          #     rootfstype=squashfs,jffs2`, the initramfs unpacker
          #     never ran, and the device booted whatever LibreMesh
          #     squashfs was on flash (CI symptom:
          #     `root@margarita:/#` instead of `root@LiMe-XXXXXX:/#`,
          #     see CI run 25021369701).
          #   * image_format=sdk-initramfs-kernel (full OpenWrt SDK)
          #     — the SDK only ships the `package` make targets; its
          #     `target/` and `include/image.mk` stubs raise
          #     "No rule to make target 'image'" and ImageBuilder
          #     explicitly skips the initramfs recipe under
          #     `$(if $(IB),,…)`. Neither tool can rebuild the
          #     kernel, which is exactly what an embedded CPIO needs.
          # That left a full openwrt.git source build as the only
          # viable path, hence the current `source-initramfs-kernel`
          # image_format.
          #
          # Why we still `setenv bootargs` here: even though the
          # source-built kernel can run with NO bootargs at all (it
          # ignores root= when an initramfs is present), the
          # LibreRouter`s persistent U-Boot env may still hold
          # `bootargs=console=ttyS0,115200n8 root=/dev/mtdblock4 …`
          # left over from sysupgrade. We override it RAM-only (no
          # `saveenv`) to keep serial console output going and to
          # avoid surprises if a future kernel decides to re-honour
          # root= from cmdline.
          init_commands:
            - "setenv bootargs console=ttyS0,115200n8"
            - "tftp 0x82000000"
          # `bootm <addr>` on the source-built initramfs uImage:
          #   * U-Boot reads the 64-byte uImage header at <addr>,
          #   * decompresses the lzma payload (kernel + appended DTB +
          #     embedded initramfs, all in one blob) to KERNEL_LOADADDR
          #     (0x80060000, set by the ath79/generic recipe in upstream
          #     OpenWrt — NOT configurable from our targets.yml since
          #     the source build embeds the loadaddr in the uImage
          #     header itself),
          #   * jumps to the kernel entry point with the linux_argv
          #     array populated from `bootargs`. The MIPS kernel finds
          #     its appended DTB at the end of the uncompressed image
          #     and its embedded CPIO inside .init.ramfs, then runs
          #     /init from the unpacked rootfs.
          boot_command: bootm 0x82000000
      - ShellDriver:
          # Strict prompt: only match LibreMesh's default `LiMe-<6 hex>`
          # hostname so we never engage with pre-`lime-config` prompts like
          # `root@(none):~#` or `root@OpenWrt:~#`. See openwrt_one.yaml for
          # rationale. login_timeout bumped to 180s — first-boot
          # uci-defaults can take >60s on this device's 8 MiB SPI NOR.
          prompt: "(?:\x1b\\][^\x07]*\x07)?(?:\x1b\\[[\\d;]*m)*root@LiMe-[0-9A-Fa-f]{6}:[^ ]*[#$] "
          login_prompt: Please press Enter to activate this console.
          await_login_timeout: 15
          login_timeout: 180
          post_login_settle_time: 5
          username: root
      - UBootTFTPStrategy: {}
      - SSHDriver:
          connection_timeout: 120.0
          explicit_scp_mode: True

images:
  root: !template $LG_IMAGE

imports:
  - ../strategies/tftpstrategy.py
