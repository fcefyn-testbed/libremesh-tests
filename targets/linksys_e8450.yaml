# Linksys E8450 / Belkin RT3200 (mt7622) - See docs/target-quirks.md for details
targets:
  main:
    features:
      - wan_port
      - wifi
    resources:
      RemotePlace:
        name: !template "$LG_PLACE"
    drivers:
      PDUDaemonDriver: {}
      TFTPProviderDriver: {}
      SerialDriver:
        txdelay: 0.01
      ShellDriver:
        prompt: "(?:\x1b\\][^\x07]*\x07)?(?:\x1b\\[[\\d;]*m)*root@LiMe-[0-9A-Fa-f]{6}:[^ ]*[#$] "
        login_prompt: Please press Enter to activate this console.
        await_login_timeout: 15
        login_timeout: 180
        post_login_settle_time: 5
        username: root
      UBootDriver:
        prompt: "MT7622>"
        interrupt: "\x03"
        login_timeout: 30
        init_commands:
          - "setenv bootconf config-1"
          # swiotlb=512 required for mt7915e WiFi DMA
          - 'setenv bootargs "console=ttyS0,115200n1 swiotlb=512 pci=pcie_bus_perf"'
          # Static TFTP avoids DHCP issues on units with corrupted factory partition
          - "tftpboot $loadaddr $bootfile"
          - "ubi part ubi || true"
          - "ubi remove rootfs_data || true"
        boot_command: bootm $loadaddr#$bootconf
      UBootTFTPStrategy: {}
      SSHDriver:
        connection_timeout: 120.0
        explicit_scp_mode: True

images:
  root: !template $LG_IMAGE

imports:
  - ../strategies/tftpstrategy.py
