targets:
  main:
    features:
      - wan_port
      - wifi
    resources:
      RemotePlace:
        name: !template "$LG_PLACE"
    drivers:
      - PDUDaemonDriver: {}
      - TFTPProviderDriver: {}
      - SerialDriver:
          txdelay: 0.01
      - UBootDriver:
          login_timeout: 30
          interrupt: "\x1b"
          autoboot: "Hit any key to stop autoboot"
          prompt: "OpenWrt One>"
          # Wipe the on-flash overlay (`rootfs_data` UBI volume) before
          # TFTP-booting our initramfs.
          #
          # Why: OpenWrt 24.10 on filogic uses fitblk + UBIFS overlay even
          # for initramfs boots. If the device's NAND has a `rootfs_data`
          # volume from a previous flash (the OpenWrt One leaves the lab
          # provisioned with vanilla OpenWrt 24.10.5 from 2025-12-17),
          # `mount_root` finds it during preinit and "switches to ubifs
          # overlay" on top of our in-RAM rootfs, effectively replacing
          # everything we just TFTP'd with the on-flash userspace. The
          # symptom is: kernel version matches today's build, but
          # `/etc/banner`, `/etc/openwrt_release`, `BusyBox` build date and
          # the `root@OpenWrt:~#` hostname all come from whatever was
          # previously sysupgraded onto the device — `lime-config` never
          # runs, `batctl` is missing, hostname stays at OpenWrt's default.
          #
          # Removing the volume here forces preinit to keep the initramfs
          # rootfs (the real LibreMesh image we just built). It is
          # idempotent on virgin devices: U-Boot's hush parser short-circuits
          # the `||` if either step fails (volume missing on a previously
          # cleaned device, partition not yet attached, etc.) so re-runs
          # don't abort the boot. Each test run starts with a fresh in-RAM
          # rootfs — exactly what CI wants.
          #
          # Strategy contract: `tools/strategies/tftpstrategy.py`
          # _prepare_uboot_commands() segregates entries starting with `tftp`
          # / `dhcp` for retry logic; entries that don't (the two `ubi …`
          # lines below) are passed through as plain init_commands and run
          # ONCE at the U-Boot prompt before the bootm.
          init_commands:
            - dhcp
            - "ubi part ubi || true"
            - "ubi remove rootfs_data || true"
          boot_command: bootm $loadaddr#$bootconf
      - ShellDriver:
          # Strict prompt: only match LibreMesh's default hostname
          # `LiMe-<last 6 hex of primary MAC>` (set by lime-config from
          # uci-defaults on first boot). We must NOT match early/intermediate
          # prompts like `root@(none):~#` or `root@OpenWrt:~#` because those
          # appear before lime-config has finished, and engaging the shell
          # there causes us to test pre-LibreMesh state. With this regex the
          # ShellDriver waits up to login_timeout for first-boot config to
          # complete — if it never does (image lacks lime-system, or DUT
          # autoboot fell back to flash), we get a clean TIMEOUT instead of a
          # silently passing test against vanilla OpenWrt.
          prompt: "(?:\x1b\\][^\x07]*\x07)?(?:\x1b\\[[\\d;]*m)*root@LiMe-[0-9A-Fa-f]{6}:[^ ]*[#$] "
          login_prompt: Please press Enter to activate this console.
          await_login_timeout: 15
          login_timeout: 180
          post_login_settle_time: 5
          username: root
      - UBootTFTPStrategy: {}
      - SSHDriver:
          connection_timeout: 120.0
          explicit_scp_mode: True

images:
  root: !template $LG_IMAGE

imports:
  - ../strategies/tftpstrategy.py
