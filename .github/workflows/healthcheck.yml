name: Healthcheck

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  PYTEST_ADDOPTS: "--color=yes"
  LG_CONSOLE: "internal"
  RELEASE: "24.10.2"
  USER: "labgrid-dev"

jobs:
  generate-matrix:
    name: Generate labnet.yaml matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Generate matrix
        id: set-matrix
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq &&\
              sudo chmod +x /usr/local/bin/yq

          # Use pipe because of this bug
          # https://github.com/mikefarah/yq/issues/2454
          devices_meta=$(
            for f in targets/*.yaml; do
              head -1 "$f" | grep -q '^openwrt:' || continue
              device=$(basename "$f" .yaml)
              so=$(yq -r '.openwrt.snapshots_only // false' "$f")
              jq -n --arg d "$device" --argjson so "$so" '{($d): {snapshots_only: $so}}'
            done | jq -s 'add'
          )

          matrix=$(yq -o=json labnet.yaml | jq --argjson devices "$devices_meta" '
            .labs as $labs |
            ($labs | to_entries) | map(
              .key as $lab |
              $labs[$lab].devices | map(
                select($devices[.] != null and $devices[.].snapshots_only != true) |
                {
                  "device": .,
                  "proxy": $labs[$lab].proxy,
                  "maintainers": $labs[$lab].maintainers,
                  "snapshots_only": $devices[.].snapshots_only
                }
              )
            ) | flatten
          ')
          echo "matrix=$(echo "$matrix" | jq -c '.')" >> $GITHUB_OUTPUT

  test-real:
    name: ${{ matrix.device }} (${{ matrix.proxy }})
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install nmap
        run: sudo apt-get -y install nmap

      - name: Setup SSH connection to coordinator
        env:
          LABGRID_SSH_KEY: ${{ secrets.LABGRID_SSH_KEY }}
          COORDINATOR_HOSTKEY: ${{ secrets.COORDINATOR_HOSTKEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$LABGRID_SSH_KEY" > ~/.ssh/labgrid
          chmod 600 ~/.ssh/labgrid

          cat > ~/.ssh/config << 'SSHEOF'
          Host coordinator
            HostName ${{ secrets.COORDINATOR_HOST }}
            Port ${{ secrets.COORDINATOR_PORT }}
            User labgrid-dev
            IdentityFile ~/.ssh/labgrid

          Host labgrid-*
            User labgrid-dev
            IdentityFile ~/.ssh/labgrid
            ProxyJump coordinator
          SSHEOF

          echo "[${{ secrets.COORDINATOR_HOST }}]:${{ secrets.COORDINATOR_PORT }} $COORDINATOR_HOSTKEY" >> ~/.ssh/known_hosts
          yq -r '.labs | to_entries[] | "\(.key) \(.value.hostkey)"' labnet.yaml >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Set environment
        env:
          DEVICE: ${{ matrix.device }}
        run: |
          # workaround until 24.10.x is fixed on tplink_tl-wr1043nd-v3
          if [ "$DEVICE" = "tplink_tl-wr1043nd-v3" ]; then
            export RELEASE=23.05.5
            echo "RELEASE=${RELEASE}" >> $GITHUB_ENV
          fi

          target=$(yq -r '.openwrt.target' targets/$DEVICE.yaml)
          profile=$(yq -r '.openwrt.profile' targets/$DEVICE.yaml)
          image_type=$(yq -r '.openwrt.image.type // "kernel"' targets/$DEVICE.yaml)
          image_fs=$(yq -r '.openwrt.image.filesystem // ""' targets/$DEVICE.yaml)

          upstream_url="https://mirror-03.infra.openwrt.org/releases/${RELEASE}/targets"
          profiles_json=$(curl -sf "$upstream_url/${target/-/\/}/profiles.json")

          if [ -n "$image_fs" ]; then
            firmware_name=$(echo "$profiles_json" | jq -r --arg p "$profile" --arg t "$image_type" --arg fs "$image_fs" \
              '.profiles[$p].images[]? | select(.type == $t and .filesystem == $fs) | .name' | head -n1)
          else
            firmware_name=$(echo "$profiles_json" | jq -r --arg p "$profile" --arg t "$image_type" \
              '.profiles[$p].images[]? | select(.type == $t) | .name' | head -n1)
          fi

          mkdir -p $GITHUB_WORKSPACE/tftp/$DEVICE
          wget -q "$upstream_url/${target/-/\/}/$firmware_name" \
            --output-document "$GITHUB_WORKSPACE/tftp/$DEVICE/$firmware_name"
          (cd $GITHUB_WORKSPACE/tftp/ && gzip -df $DEVICE/$firmware_name) || true

          FIRMWARE_VERSION=$(echo "$profiles_json" | jq -r '.version_code')
          echo "FIRMWARE_VERSION=$FIRMWARE_VERSION" >> $GITHUB_ENV
          echo "LG_IMAGE=$GITHUB_WORKSPACE/tftp/$DEVICE/${firmware_name/.gz/}" >> $GITHUB_ENV
          echo "LG_PROXY=${{ matrix.proxy }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Wait for free device
        run: |
          eval $(uv run labgrid-client reserve --wait --shell device=${{ matrix.device }})
          echo "LG_TOKEN=$LG_TOKEN" >> $GITHUB_ENV
          echo "LG_PLACE=+" >> $GITHUB_ENV
          uv run labgrid-client -p +$LG_TOKEN lock
          echo "LG_ENV=targets/${{ matrix.device }}.yaml" >> $GITHUB_ENV

      - name: Run test
        id: test
        run: |
          uv run pytest tests/test_base.py::test_shell tests/test_base.py::test_ssh -v \
            --lg-log \
            --lg-colored-steps \
            --log-cli-level=CONSOLE

      - name: Poweroff and unlock device
        if: always()
        run: |
          uv run labgrid-client power off || true
          uv run labgrid-client unlock

      - name: Upload console logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: console-${{ matrix.proxy }}-${{ matrix.device }}
          path: console_*

      - name: Handle test result
        uses: actions/github-script@v9
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueTitle = "Healthcheck ${{ matrix.proxy }}/${{ matrix.device }}";
            const runUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}";
            const isSuccess = "${{ job.status }}" === "success";

            const failureBody = `
              ### ❌ Healthcheck Failed

              The automated healthcheck for:

              - **Proxy**: \`${{ matrix.proxy }}\`
              - **Device**: \`${{ matrix.device }}\`
              - **Maintainers**: ${{ join(matrix.maintainers, ', ') }}

              has **failed**. Please review the logs and investigate the issue.

              🔗 [View the full workflow run](${runUrl})
            `.trim();

            // Fetch existing issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });

            let testIssue = issues.data.find(issue =>
              issue.title === issueTitle &&
              issue.user.type === "Bot"
            );

            if (isSuccess) {
              if (testIssue) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: testIssue.number,
                  state: "closed",
                });
              }
              console.log("Closed issue as test passed.");
            } else {
              if (testIssue) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: testIssue.number,
                  state: "open",
                  body: failureBody,
                  labels: ["healthcheck"],
                });
                console.log("Reopened existing issue due to test failure.");
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body: failureBody,
                  labels: ["healthcheck"],
                });
                console.log("Created new issue due to test failure.");
              }
            }
