name: Daily LibreMesh tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      LM_IMAGE_CATALOG:
        description: "Image from catalog (e.g. lime-2024.1, lime-snapshot). Empty = device default."
        required: false
        default: ""
      LM_IMAGE_URL:
        description: "Override with firmware URL (optional, for future use)"
        required: false
        default: ""
  schedule:
    # 06:00 UTC — after openwrt-tests midnight run, no hardware collision
    - cron: "0 6 * * *"

env:
  PYTHONUNBUFFERED: "1"
  PYTEST_ADDOPTS: "--color=yes"
  LG_CONSOLE: "internal"
  USER: "labgrid-dev"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-matrix:
    name: Generate labnet.yaml matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Generate matrix
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq &&\
              sudo chmod +x /usr/local/bin/yq

          matrix=$(yq -o=json '
            . as $root |
            $root.labs as $labs |
            $root.devices as $devices |
            $labs
            | to_entries
            | map(
                .key as $lab |
                .value.devices
                | map(
                    select($devices[.] != null) |
                    {
                      "device": .,
                      "name": $devices[.].name,
                      "proxy": $labs[$lab].proxy,
                      "target": $devices[.].target,
                      "firmware": $devices[.].firmware,
                      "maintainers": $labs[$lab].maintainers
                    }
                  )
              )
            | flatten
          ' labnet.yaml)
          echo "matrix=$(echo "$matrix" | jq -c '.')" >> $GITHUB_ENV

      - name: Filter out devices with open healthcheck issues
        id: set-matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get open issues with healthcheck label
          issues=$(gh issue list --label "healthcheck" --state open --json title,labels --jq '.[] | .title')

          # Filter out matrix entries where proxy/device combination has an open healthcheck issue
          filtered_matrix=$(echo "$matrix" | jq --argjson issues "$(echo "$issues" | jq -R -s 'split("\n") | map(select(length > 0))')" '
            map(select(
              . as $entry |
              ($issues | map(test("\($entry.proxy)/\($entry.device)")) | any) | not
            ))
          ')

          deduplicated_matrix=$(echo "$filtered_matrix" | jq '
            group_by(.device) | map(.[0])
          ')

          echo "matrix=$(echo "$deduplicated_matrix" | jq -c '.')" >> $GITHUB_OUTPUT

  test-real:
    name: ${{ matrix.name }} (${{ matrix.proxy }})
    needs: generate-matrix
    runs-on: [self-hosted, testbed-fcefyn]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set environment
        run: |
          echo "LG_PROXY=${{ matrix.proxy }}" >> $GITHUB_ENV
          if [ -n "${{ github.event.inputs.LM_IMAGE_URL }}" ]; then
            echo "LM_IMAGE_URL=${{ github.event.inputs.LM_IMAGE_URL }}" >> $GITHUB_ENV
          fi

      - name: Wait for free device
        run: |
          # Create reservation and get token (reserve --shell returns immediately with token)
          eval $(uv run labgrid-client reserve --shell device=${{ matrix.device }})
          echo "LG_TOKEN=$LG_TOKEN" >> $GITHUB_ENV
          echo "LG_PLACE=+" >> $GITHUB_ENV
          # Explicitly wait for allocation (reserve --wait can return before allocated in some labgrid forks)
          timeout 180 uv run labgrid-client wait || {
            echo "::error::labgrid reserve timed out after 3 min. Check: labgrid-client who (release acquired places), coordinator/exporter running, places have device tag."
            exit 1
          }
          LOCK_OUT=$(uv run labgrid-client -p +$LG_TOKEN lock 2>&1) || {
            echo "$LOCK_OUT"
            echo "::error::labgrid lock failed"
            exit 1
          }
          echo "$LOCK_OUT"
          PLACE=$(echo "$LOCK_OUT" | sed -n 's/.*acquired place \([^ ]*\).*/\1/p')
          if [ -n "$PLACE" ]; then
            echo "LG_PLACE=$PLACE" >> $GITHUB_ENV
            echo "Resolved LG_PLACE=$PLACE"
          else
            echo "::warning::Could not parse place name from lock output"
          fi
          echo "LG_ENV=targets/${{ matrix.device }}.yaml" >> $GITHUB_ENV

      - name: Resolve LG_IMAGE from catalog
        run: |
          CATALOG_KEY="${{ github.event.inputs.LM_IMAGE_CATALOG || '' }}"
          if [ -n "$CATALOG_KEY" ]; then
            LG_IMAGE=$(uv run python scripts/resolve_firmware_from_catalog.py "${{ matrix.device }}" "$CATALOG_KEY")
          else
            LG_IMAGE=$(uv run python scripts/resolve_firmware_from_catalog.py "${{ matrix.device }}")
          fi
          echo "LG_IMAGE=$LG_IMAGE" >> $GITHUB_ENV
          echo "Resolved LG_IMAGE=$LG_IMAGE"

      - name: Run LibreMesh tests
        id: test
        run: |
          mkdir -p ${{ matrix.device }}/
          uv run pytest tests/test_libremesh.py \
            --lg-log ${{ matrix.device }}/ \
            --junitxml=${{ matrix.device }}/report.xml \
            --lg-colored-steps \
            --log-cli-level=CONSOLE

      - name: Poweroff and unlock device
        if: always()
        run: |
          if [ -n "${{ env.LG_TOKEN }}" ]; then
            uv run labgrid-client power off || true
            uv run labgrid-client -p +$LG_TOKEN unlock
          fi

      - name: Upload results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: results-${{ matrix.device }}
          path: ${{ matrix.device }}/*
